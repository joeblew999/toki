version: '3'

env:
  GOWORK: off

vars:
  TOKI_CMD: toki
  DEFAULT_LOCALE: en
  BUNDLE_DIR: tokibundle
  EXAMPLES_DIR: "{{.ROOT_DIR}}/examples"

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list-all
    silent: true

  install:
    desc: Install toki from source
    cmds:
      - go install -v ./...

  test:
    desc: Run all tests
    cmds:
      - go test ./...

  # Examples - Simple (Go)
  simple:
    desc: Build simple Go example
    deps: [install]
    dir: "{{.EXAMPLES_DIR}}/simple"
    cmds:
      - "{{.TOKI_CMD}} generate -l en -t de -t ru -v"
      - go build -o simple .

  simple:clean:
    dir: "{{.EXAMPLES_DIR}}/simple"
    cmds:
      - rm -rf tokibundle simple

  # Examples - Complex (Go)
  complex:
    desc: Build complex Go example
    deps: [install]
    dir: "{{.EXAMPLES_DIR}}/complex"
    cmds:
      - "{{.TOKI_CMD}} generate -l en -t de -t ru -v"
      - go build -o complex .

  complex:clean:
    dir: "{{.EXAMPLES_DIR}}/complex"
    cmds:
      - rm -rf tokibundle complex

  # Examples - Simpleweb (Go)
  simpleweb:
    desc: Build simpleweb Go example
    deps: [install]
    dir: "{{.EXAMPLES_DIR}}/simpleweb"
    cmds:
      - "{{.TOKI_CMD}} generate -l en -t de -v"
      - go build -o simpleweb .
      - echo "Run ./simpleweb to start server on :8080"

  simpleweb:clean:
    dir: "{{.EXAMPLES_DIR}}/simpleweb"
    cmds:
      - rm -rf tokibundle simpleweb

  # Examples - Hugo (Markdown-only)
  hugo:
    desc: Generate ARB files for Hugo markdown example
    deps: [install]
    dir: "{{.EXAMPLES_DIR}}/hugo"
    cmds:
      - "{{.TOKI_CMD}} generate -l en -md ./content/en -md-only -t de -t zh -v"

  hugo:clean:
    dir: "{{.EXAMPLES_DIR}}/hugo"
    cmds:
      - rm -rf tokibundle

  # Examples - Markdown parser demo
  markdown:
    desc: Run markdown parser demo
    dir: "{{.EXAMPLES_DIR}}/markdown"
    cmds:
      - go run . -content ./content -v

  # Verify all examples work
  verify:
    desc: Clean and regenerate all examples
    cmds:
      - task: simple:clean
      - task: complex:clean
      - task: simpleweb:clean
      - task: hugo:clean
      - task: simple
      - task: complex
      - task: simpleweb
      - task: hugo
      - echo "✅ All examples verified"

  # Generic commands (for use in other projects)
  generate:
    desc: Regenerate bundle in current directory
    deps: [install]
    dir: "{{.USER_WORKING_DIR}}"
    cmds:
      - "{{.TOKI_CMD}} generate -l {{.DEFAULT_LOCALE}} -v"

  lint:
    desc: Check translation completeness
    deps: [install]
    dir: "{{.USER_WORKING_DIR}}"
    cmds:
      - "{{.TOKI_CMD}} lint -require-complete -v"

  webedit:
    desc: Open web translation editor
    deps: [install]
    dir: "{{.USER_WORKING_DIR}}"
    cmds:
      - "{{.TOKI_CMD}} webedit"

  clean:
    desc: Clean bundle in current directory
    dir: "{{.USER_WORKING_DIR}}"
    cmds:
      - rm -rf {{.BUNDLE_DIR}}
