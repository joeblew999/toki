version: '3'

env:
  GOWORK: off

vars:
  TOKI_CMD: toki
  DEFAULT_LOCALE: en
  BUNDLE_DIR: tokibundle
  EXAMPLES_DIR: "{{.ROOT_DIR}}/examples"

tasks:
  default:
    cmds:
      - task --list-all
    silent: true

  install:
    desc: Install toki
    cmds:
      - go install -v ./...

  test:
    desc: Run tests
    cmds:
      - go test ./...

  # Simple
  simple:
    deps: [install]
    dir: "{{.EXAMPLES_DIR}}/simple"
    cmds:
      - "{{.TOKI_CMD}} generate -l en -t de -t ru -v"
      - go build -o simple .

  simple:run:
    desc: Build and run simple example
    deps: [simple]
    dir: "{{.EXAMPLES_DIR}}/simple"
    cmds:
      - ./simple

  simple:run:de:
    deps: [simple]
    dir: "{{.EXAMPLES_DIR}}/simple"
    cmds:
      - ./simple -l de

  simple:clean:
    dir: "{{.EXAMPLES_DIR}}/simple"
    cmds:
      - rm -rf tokibundle simple

  # Complex
  complex:
    deps: [install]
    dir: "{{.EXAMPLES_DIR}}/complex"
    cmds:
      - "{{.TOKI_CMD}} generate -l en -t de -t ru -v"
      - go build -o complex .

  complex:run:
    desc: Build and run complex example
    deps: [complex]
    dir: "{{.EXAMPLES_DIR}}/complex"
    cmds:
      - ./complex

  complex:run:de:
    deps: [complex]
    dir: "{{.EXAMPLES_DIR}}/complex"
    cmds:
      - ./complex -l de

  complex:clean:
    dir: "{{.EXAMPLES_DIR}}/complex"
    cmds:
      - rm -rf tokibundle complex

  # Simpleweb
  simpleweb:
    deps: [install]
    dir: "{{.EXAMPLES_DIR}}/simpleweb"
    cmds:
      - "{{.TOKI_CMD}} generate -l en -t de -v"
      - go build -o simpleweb .

  simpleweb:run:
    desc: Build and run simpleweb example
    deps: [simpleweb]
    dir: "{{.EXAMPLES_DIR}}/simpleweb"
    cmds:
      - ./simpleweb

  simpleweb:clean:
    dir: "{{.EXAMPLES_DIR}}/simpleweb"
    cmds:
      - rm -rf tokibundle simpleweb

  # Hugo (markdown translation for static sites)
  hugo:
    desc: Generate ARB for Hugo markdown (en -> de, zh)
    deps: [install]
    dir: "{{.EXAMPLES_DIR}}/hugo"
    cmds:
      - "{{.TOKI_CMD}} generate -l en -md ./content/en -md-only -t de -t zh -v"

  hugo:arb:
    desc: Show generated ARB catalog
    dir: "{{.EXAMPLES_DIR}}/hugo"
    cmds:
      - cat tokibundle/catalog_en.arb

  hugo:clean:
    dir: "{{.EXAMPLES_DIR}}/hugo"
    cmds:
      - rm -rf tokibundle

  # Markdown (standalone parser demo)
  markdown:
    desc: Run markdown parser demo
    dir: "{{.EXAMPLES_DIR}}/markdown"
    cmds:
      - go run . -content ./content -v

  markdown:json:
    desc: Output markdown as ARB JSON
    dir: "{{.EXAMPLES_DIR}}/markdown"
    cmds:
      - go run . -content ./content -json

  # Verify
  verify:
    desc: Build all examples
    cmds:
      - task: simple:clean
      - task: complex:clean
      - task: simpleweb:clean
      - task: hugo:clean
      - task: simple
      - task: complex
      - task: simpleweb
      - task: hugo

  # Generic
  generate:
    deps: [install]
    dir: "{{.USER_WORKING_DIR}}"
    cmds:
      - "{{.TOKI_CMD}} generate -l {{.DEFAULT_LOCALE}} -v"

  lint:
    deps: [install]
    dir: "{{.USER_WORKING_DIR}}"
    cmds:
      - "{{.TOKI_CMD}} lint -require-complete -v"

  webedit:
    deps: [install]
    dir: "{{.USER_WORKING_DIR}}"
    cmds:
      - "{{.TOKI_CMD}} webedit"

  clean:
    dir: "{{.USER_WORKING_DIR}}"
    cmds:
      - rm -rf {{.BUNDLE_DIR}}
